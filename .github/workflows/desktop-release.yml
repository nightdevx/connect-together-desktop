name: Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    environment:
      name: ${{ vars.DESKTOP_RELEASE_ENVIRONMENT || 'production' }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve desktop version
        id: version
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install desktop dependencies
        run: npm ci

      - name: Create .env from GitHub Secrets
        env:
          CT_BACKEND_URL: ${{ secrets.CT_BACKEND_URL }}
          CT_LIVEKIT_ROOM: ${{ secrets.CT_LIVEKIT_ROOM }}
          CT_ICE_URLS: ${{ secrets.CT_ICE_URLS }}
          CT_ICE_USERNAME: ${{ secrets.CT_ICE_USERNAME }}
          CT_ICE_CREDENTIAL: ${{ secrets.CT_ICE_CREDENTIAL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CT_BACKEND_URL)) {
            throw "Missing secret: CT_BACKEND_URL"
          }

          if ([string]::IsNullOrWhiteSpace($env:CT_LIVEKIT_ROOM)) {
            throw "Missing secret: CT_LIVEKIT_ROOM"
          }

          @(
            "CT_BACKEND_URL=$($env:CT_BACKEND_URL)"
            "CT_LIVEKIT_ROOM=$($env:CT_LIVEKIT_ROOM)"
            "CT_ICE_URLS=$($env:CT_ICE_URLS)"
            "CT_ICE_USERNAME=$($env:CT_ICE_USERNAME)"
            "CT_ICE_CREDENTIAL=$($env:CT_ICE_CREDENTIAL)"
          ) | Set-Content -Path .env -Encoding UTF8

      - name: Build desktop release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Connect Together Desktop v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
